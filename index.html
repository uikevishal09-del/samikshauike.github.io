<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Mens Wear</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#f5f5f5;}

header{
background:#111;color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.hero{
height:50vh;
background:url('https://images.unsplash.com/photo-1521334884684-d80222895322') center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
}

.products{padding:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{width:100%;height:160px;object-fit:cover;}

.card-body{text-align:center;padding:10px;}

button{
padding:6px 10px;
border:none;
background:#111;color:#fff;
cursor:pointer;
border-radius:5px;
}
</style>
</head>

<body>

<header>
<h2>👕 Sai Mens Wear</h2>
</header>

<section class="hero">
🔥 Latest Men's Collection
</section>

<section class="products">
<h2>Our Products</h2>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
<div class="card-body">
<h3>Shirt</h3>
<p>₹500</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">
<div class="card-body">
<h3>Jeans</h3>
<p>₹1200</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975922284-9cbd8c92d3b7">
<div class="card-body">
<h3>T-Shirt</h3>
<p>₹400</p>
</div>
</div>

</div>
</section>

</body>
</html>
